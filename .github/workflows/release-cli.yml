name: Release CLI

# Publishes @openape/ape-plans to npm when a tag like cli-v0.1.0 is pushed.
# Requires the repo secret NPM_TOKEN (npm automation token with publish rights).

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. cli-v0.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openape/ape-plans exec tsc --noEmit
      - run: pnpm --filter @openape/ape-plans build

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          EXPECTED="cli-v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match cli/package.json version ($EXPECTED)"
            exit 1
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @openape/ape-plans publish --no-git-checks --access public
